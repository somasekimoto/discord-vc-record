name: gitleaks

# push / PR のたびに秘密情報スキャン。ローカルフック未導入の環境でも必ず検査する番人。
on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全履歴をスキャン
      - name: Run gitleaks
        # v3 は Node20→Node24 移行のみ(inputs/挙動の変更なし)。
        # Node20 ランナーは 2026-09-16 に撤去され v2 は動かなくなるため v3 を使う。
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # gitleaks-action@v2 は PR スキャン時に GITHUB_TOKEN が必須。
          # 未指定だと "GITHUB_TOKEN is now required to scan pull requests" で失敗する。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
